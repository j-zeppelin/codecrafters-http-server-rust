info:
  name: user-agent
  type: http
  seq: 4

http:
  method: GET
  url: http://127.0.0.1:4221/user-agent
  headers:
    - name: User-Agent
      value: test-user-agent
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: eq
      value: text/plain
    - expression: res.headers['content-length']
      operator: eq
      value: "'15'"
    - expression: res.body
      operator: eq
      value: test-user-agent

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
