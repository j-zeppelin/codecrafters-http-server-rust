info:
  name: echo
  type: http
  seq: 3

http:
  method: GET
  url: http://127.0.0.1:4221/echo/abc
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: eq
      value: text/plain
    - expression: res.headers['content-length']
      operator: eq
      value: "'3'"
    - expression: res.body
      operator: eq
      value: abc

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
