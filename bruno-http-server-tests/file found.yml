info:
  name: file found
  type: http
  seq: 5

http:
  method: GET
  url: http://127.0.0.1:4221/files/hello.txt
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("body is amogus", function () {
          const data = res.getBody();
          expect(data).to.equal("amogus\n")
        })
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: eq
      value: application/octet-stream
    - expression: res.headers['content-length']
      operator: eq
      value: "'7'"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
