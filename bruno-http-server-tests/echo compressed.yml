info:
  name: echo compressed
  type: http
  seq: 8

http:
  method: GET
  url: http://127.0.0.1:4221/echo/abc
  headers:
    - name: Accept-Encoding
      value: gzip
  params:
    - name: ""
      value: ""
      type: query
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: eq
      value: text/plain
    - expression: res.headers['content-length']
      operator: eq
      value: "'3'"
    - expression: res.body
      operator: eq
      value: abc

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
